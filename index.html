<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACI Matrix</title>
<style>
  :root {
    --purple-dark:   #3B1063;
    --purple-mid:    #7030A0;
    --purple-light:  #D9C2EC;
    --purple-xlight: #EDE0F7;
    --purple-row-a:  #FAF5FF;
    --purple-row-b:  #F3E8FA;
    --r: #FF9900; --a: #CC0000; --c: #4472C4; --i: #70AD47;
    --white: #ffffff; --grey: #F2F2F2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Avenir Next LT Pro", "Avenir Next", "Segoe UI", Arial, sans-serif;
         font-size: 13px; background: #f4f0f8; color: #222; }

  /* ── Header ── */
  .app-header {
    background: var(--purple-dark); color: white;
    padding: 18px 28px 14px; display: flex; align-items: center; gap: 16px;
  }
  .app-header h1 { font-size: 20px; font-weight: 700; letter-spacing: .3px; }
  .app-header p  { font-size: 12px; opacity: .75; margin-top: 2px; }

  /* ── Filters panel ── */
  .filters {
    background: white; border-bottom: 2px solid var(--purple-light);
    padding: 14px 28px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 200px; }
  .filter-group label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: var(--purple-mid);
  }
  .filter-group select, .filter-group input {
    border: 1.5px solid var(--purple-light); border-radius: 6px;
    padding: 7px 10px; font-size: 13px; font-family: inherit;
    background: white; color: #222; outline: none; cursor: pointer;
    transition: border-color .15s;
  }
  .filter-group select:focus, .filter-group input:focus {
    border-color: var(--purple-mid);
  }
  .filter-group.pos-group { min-width: 340px; }

  /* Position multi-select chips */
  .pos-chips { display: flex; flex-wrap: wrap; gap: 5px; max-width: 700px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--purple-light);
    background: var(--purple-xlight); color: var(--purple-dark);
    transition: all .15s; user-select: none;
  }
  .chip:hover { border-color: var(--purple-mid); }
  .chip.active { background: var(--purple-mid); color: white; border-color: var(--purple-mid); }
  .chip-all { background: var(--purple-dark); color: white; border-color: var(--purple-dark); }
  .chip-all.active { opacity: 1; }

  .filter-actions { display: flex; flex-direction: column; gap: 4px; }
  .btn {
    padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 600; transition: all .15s;
  }
  .btn-primary { background: var(--purple-mid); color: white; }
  .btn-primary:hover { background: var(--purple-dark); }
  .btn-ghost { background: var(--purple-xlight); color: var(--purple-dark); border: 1.5px solid var(--purple-light); }
  .btn-ghost:hover { border-color: var(--purple-mid); }

  /* ── Stats bar ── */
  .stats-bar {
    background: var(--purple-xlight); padding: 7px 28px;
    font-size: 11px; color: var(--purple-dark); display: flex; gap: 20px;
    border-bottom: 1px solid var(--purple-light);
  }
  .stats-bar span b { color: var(--purple-mid); }

  /* ── Table wrapper ── */
  .table-wrap { overflow-x: auto; padding: 0; }
  table { border-collapse: collapse; width: 100%; min-width: 700px; }

  /* ── Sticky header ── */
  thead th {
    position: sticky; top: 0; z-index: 10;
    background: var(--purple-dark); color: white;
    padding: 9px 8px; text-align: center;
    font-size: 11px; font-weight: 700; letter-spacing: .3px;
    border: 1px solid rgba(255,255,255,.15); white-space: nowrap;
  }
  thead th.col-task  { text-align: left; min-width: 300px; max-width: 520px; }
  thead th.col-dep   { min-width: 90px; }
  thead th.col-cat   { min-width: 130px; }
  thead th.col-date  { min-width: 120px; }
  thead th.col-out   { min-width: 110px; }
  thead th.col-role  { min-width: 64px; background: var(--purple-mid); }
  thead th.col-comm  { min-width: 160px; text-align: left; }
  thead .subrow th   { background: var(--purple-mid); font-size: 11px; font-weight: 500; opacity: .9; }

  /* ── Rows ── */
  tbody tr { transition: background .1s; }
  tbody tr:nth-child(odd)  td { background: var(--purple-row-a); }
  tbody tr:nth-child(even) td { background: var(--purple-row-b); }
  tbody tr:hover td { background: #ead9f8 !important; }
  td {
    padding: 7px 8px; vertical-align: top;
    border: 1px solid #e8ddf4; font-size: 12px; line-height: 1.45;
  }
  td.col-dep {
    font-weight: 700; color: var(--purple-dark); background: var(--purple-light) !important;
    text-align: center; white-space: nowrap;
  }
  td.col-cat {
    color: var(--purple-mid); background: var(--purple-xlight) !important;
    font-size: 11px; white-space: nowrap;
  }
  td.col-task { text-align: left; }
  td.col-task.red-task { color: #CC0000; font-weight: 600; }
  td.col-date, td.col-out { font-size: 11px; color: #555; font-style: italic; }
  td.col-comm { font-size: 11px; color: #7A6000; font-style: italic; background: #FFFDE7 !important; }

  /* ── RACI badge ── */
  .badge {
    display: inline-block; width: 28px; height: 28px; line-height: 28px;
    border-radius: 6px; text-align: center; font-weight: 800;
    font-size: 13px; color: white; letter-spacing: 0;
  }
  .badge-R { background: var(--r); color: #222; }
  .badge-A { background: var(--a); color: white; }
  .badge-C { background: var(--c); }
  .badge-I { background: var(--i); }
  .badge-empty { background: var(--grey); color: #bbb; font-size: 11px; }

  td.col-role { text-align: center; vertical-align: middle; padding: 4px; }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap; padding: 10px 28px;
    background: white; border-top: 1px solid var(--purple-light);
    font-size: 11px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }

  /* ── Empty state ── */
  .empty { padding: 60px; text-align: center; color: #999; font-size: 14px; }

  /* ── Greyed-out (unavailable) filter options ── */
  .filter-group select option:disabled {
    color: #c0b0d8;
  }
  .chip.chip-disabled {
    opacity: 0.35;
    cursor: not-allowed;
    border-color: var(--purple-light) !important;
    background: var(--grey) !important;
    color: #999 !important;
  }
  .chip.chip-disabled:hover { border-color: var(--purple-light) !important; }

  /* ── Group separator ── */
  tr.dep-separator td {
    background: var(--purple-light) !important;
    font-weight: 700; font-size: 11px; color: var(--purple-dark);
    padding: 4px 10px; letter-spacing: .5px; text-transform: uppercase;
  }

  .role-cols-header { background: var(--purple-mid) !important; }

  /* ── Custom tooltip ── */
  #tooltip {
    position: fixed;
    background: var(--purple-dark);
    color: white;
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s ease;
    z-index: 9999;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(59,16,99,.35);
    max-width: 260px;
    white-space: normal;
  }
  #tooltip::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-bottom: none;
    border-top-color: var(--purple-dark);
  }
  #tooltip.visible { opacity: 1; }
</style>
</head>
<body>

<div id="tooltip"></div>
<div class="app-header">
  <div>
    <h1>RACI Matrix</h1>
    <p>Responsibility assignment matrix</p>
  </div>
</div>

<div class="filters">
  <div class="filter-group" style="flex-direction:row;align-items:center;gap:10px;flex-wrap:wrap;width:100%">
    <label style="white-space:nowrap;margin-bottom:0">Positions:</label>
    <div class="pos-chips" id="posChips"></div>
  </div>
  <div class="filter-group" style="flex-direction:row;align-items:center;gap:16px;flex-wrap:wrap;margin-top:6px;width:100%">
    <div class="filter-group">
      <label>Department</label>
      <select id="depFilter"><option value="">(All)</option></select>
    </div>
    <div class="filter-group">
      <label>Category</label>
      <select id="catFilter"><option value="">(All)</option></select>
    </div>
    <div class="filter-group">
      <label>Search</label>
      <input type="text" id="searchInput" placeholder="Type to search…" style="min-width:200px">
    </div>
    <div class="filter-actions">
      <label style="visibility:hidden;font-size:11px;font-weight:700">&#8203;</label>
      <button class="btn btn-ghost" onclick="resetFilters()">Reset all</button>
    </div>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="table-wrap">
  <table id="raciTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty" id="emptyState" style="display:none">No rows match the current filters.</div>
</div>

<div class="legend">
  <div class="legend-item"><b style="color:var(--purple-dark)">Legend:</b></div>
  <div class="legend-item"><span class="badge badge-R" data-tooltip="Responsible – This team member does the work to complete the task. Every task needs at least one Responsible party, but it's okay to assign more.">R</span> Responsible – does the work</div>
  <div class="legend-item"><span class="badge badge-A" data-tooltip="Accountable – This person delegates work and is the last one to review the task or deliverable before it's deemed complete. On some tasks, the Responsible party may also serve as the Accountable one.">A</span> Accountable – owns the outcome</div>
  <div class="legend-item"><span class="badge badge-C" data-tooltip="Consulted – Every deliverable is strengthened by review and consultation from more than one team member. Consulted parties are typically the people who provide input based on either how it will impact their future project work or their domain of expertise on the deliverable itself.">C</span> Consulted – input required</div>
  <div class="legend-item"><span class="badge badge-I" data-tooltip="Informed – These team members simply need to be kept in the loop on project progress, rather than roped into the details of every deliverable.">I</span> Informed – kept in the loop</div>
</div>

 \"\"}, \"comments\": \"\"}, {\"dep\": \"ALL\", \"cat\": \"Internal Communication\", \"task\": \"Evaluation of feedback from survey to participants will sended by organizer of mtg. The results will be presented at the next management meeting, and appropriate conclusions will be drawn based on the feedback.\", \"date\": \"1 week after the mtg\", \"outcome\": \"Feedback survey and feedback evaluation\", \"raci\": {\"SM/ KAM\": \"I\", \"CoM\": \"\", \"HSD\": \"R\", \"LC\": \"\", \"SFAS\": \"I\", \"CC\": \"\", \"HGex\": \"I\", \"TD\": \"R\", \"HD\": \"R\", \"jFAS\": \"I\", \"sFAS\": \"I\", \"mFAS\": \"I\", \"FAS\": \"I\", \"jFSE\": \"I\", \"sFSE\": \"I\", \"mFSE\": \"I\", \"FSE\": \"I\", \"AS\": \"\", \"AI\": \"\", \"APK\": \"\", \"ATAP\": \"I\", \"KASP\": \"I\", \"MC\": \"I\", \"TSM\": \"I\", \"D\": \"A\", \"CEO\": \"\"}, \"comments\": \"\"}, {\"dep\": \"ALL\", \"cat\": \"Internal Communication\", \"task\": \"Information about sign a new contract with suppliers, this information will be sent by the D to the entire GeneTiCA team.\", \"date\": \"1 week after signature\", \"outcome\": \"Intranet info+ mail to GT staff\", \"raci\": {\"SM/ KAM\": \"I\", \"CoM\": \"\", \"HSD\": \"I\", \"LC\": \"\", \"SFAS\": \"I\", \"CC\": \"I\", \"HGex\": \"I\", \"TD\": \"I\", \"HD\": \"I\", \"jFAS\": \"I\", \"sFAS\": \"I\", \"mFAS\": \"I\", \"FAS\": \"I\", \"jFSE\": \"I\", \"sFSE\": \"I\", \"mFSE\": \"I\", \"FSE\": \"I\", \"AS\": \"I\", \"AI\": \"I\", \"APK\": \"\", \"ATAP\": \"I\", \"KASP\": \"I\", \"MC\": \"I\", \"TSM\": \"I\", \"D\": \"A\", \"CEO\": \"\"}, \"comments\": \"\"}, {\"dep\": \"ALL\", \"cat\": \"Internal Communication\", \"task\": \"Report from director´s mtg with Circulos Group will be sent by D at his discretion. If any action is needed by the team (major changes e.g. in the rules) he/she will appoint a responsible person.\", \"date\": \"24 h after the mtg\", \"outcome\": \"Intranet info+ mail to GT staff\", \"raci\": {\"SM/ KAM\": \"I\", \"CoM\": \"\", \"HSD\": \"I\", \"LC\": \"\", \"SFAS\": \"I\", \"CC\": \"I\", \"HGex\": \"I\", \"TD\": \"I\", \"HD\": \"I\", \"jFAS\": \"I\", \"sFAS\": \"I\", \"mFAS\": \"I\", \"FAS\": \"I\", \"jFSE\": \"I\", \"sFSE\": \"I\", \"mFSE\": \"I\", \"FSE\": \"I\", \"AS\": \"I\", \"AI\": \"I\", \"APK\": \"\", \"ATAP\": \"I\", \"KASP\": \"I\", \"MC\": \"I\", \"TSM\": \"I\", \"D\": \"A\", \"CEO\": \"\"}, \"comments\": \"\"}, {\"dep\": \"ALL\", \"cat\": \"Internal Communication\", \"task\": \"Updates on stock levels and supply chain status are used whenever there are changes in the availability of goods, spare parts, or services with impact on business — for example, when items become out of stock, delivery times are delayed etc. This communication ensures that all relevant employees are informed in time to adjust their planning, customer communication, or operations accordingly.\", \"date\": \"24 h after receiving the info\", \"outcome\": \"Intranet info+ mail to GT staff\", \"raci\": {\"SM/ KAM\": \"R\", \"CoM\": \"A\", \"HSD\": \"R\", \"LC\": \"\", \"SFAS\": \"R\", \"CC\": \"R\", \"HGex\": \"\", \"TD\": \"R\", \"HD\": \"R\", \"jFAS\": \"R\", \"sFAS\": \"R\", \"mFAS\": \"R\", \"FAS\": \"R\", \"jFSE\": \"R\", \"sFSE\": \"R\", \"mFSE\": \"R\", \"FSE\": \"R\", \"AS\": \"R\", \"AI\": \"R\", \"APK\": \"\", \"ATAP\": \"R\", \"KASP\": \"R\", \"MC\": \"\", \"TSM\": \"\", \"D\": \"R\", \"CEO\": \"\"}, \"comments\": \"\"}, {\"dep\": \"ALL\", \"cat\": \"Internal Communication\", \"task\": \"Processing of feedback colected by “Wishbox” . Submission of reports is subject to the terms of use of this tool. Reports (feedback, wish,...) will be discussed within the management team and, if necessary and agreed by the management team, will be addressed to affected person.\", \"date\": \"Next management mtg\", \"outcome\": \"Feedback evaluation\", \"raci\": {\"SM/ KAM\": \"I\", \"CoM\": \"\", \"HSD\": \"R\", \"LC\": \"\", \"SFAS\": \"I\", \"CC\": \"I\", \"HGex\": \"I\", \"TD\": \"R\", \"HD\": \"R\", \"jFAS\": \"I\", \"sFAS\": \"I\", \"mFAS\": \"I\", \"FAS\": \"I\", \"jFSE\": \"I\", \"sFSE\": \"I\", \"mFSE\": \"I\", \"FSE\": \"I\", \"AS\": \"I\", \"AI\": \"I\", \"APK\": \"\", \"ATAP\": \"I\", \"KASP\": \"I\", \"MC\": \"I\", \"TSM\": \"I\", \"D\": \"A\", \"CEO\": \"\"}, \"comments\": \"\"}, {\"dep\": \"ALL\", \"cat\": \"Internal Communication\", \"task\": \"Urgent  anouncements\", \"date\": \"Immediately\", \"outcome\": \"Intranet info + mail to GT staff, call or person\", \"raci\": {\"SM/ KAM\": \"I\", \"CoM\": \"\", \"HSD\": \"R\", \"LC\": \"\", \"SFAS\": \"I\", \"CC\": \"I\", \"HGex\": \"I\", \"TD\": \"R\", \"HD\": \"R\", \"jFAS\": \"I\", \"sFAS\": \"I\", \"mFAS\": \"I\", \"FAS\": \"I\", \"jFSE\": \"I\", \"sFSE\": \"I\", \"mFSE\": \"I\", \"FSE\": \"I\", \"AS\": \"I\", \"AI\": \"I\", \"APK\": \"\", \"ATAP\": \"I\", \"KASP\": \"I\", \"MC\": \"I\", \"TSM\": \"I\", \"D\": \"R\", \"CEO\": \"\"}, \"comments\": \"R person is also A person depending on specific situation.\"}]}");

// Enrich positions with missing junior/senior/mentor variants
const EXTRA_POSITIONS = {
  'jFAS': 'Junior Field Application Specialist',
  'sFAS': 'Senior Field Application Specialist',
  'mFAS': 'Mentor Field Application Specialist',
  'jFSE': 'Junior Field Service Engineer',
  'sFSE': 'Senior Field Service Engineer',
  'mFSE': 'Mentor Field Service Engineer',
};
DATA.raci_cols.forEach(abbr => {
  if (EXTRA_POSITIONS[abbr] && !DATA.positions.find(p => p.abbr === abbr)) {
    // Insert after base position (FAS or FSE)
    const base = abbr.slice(1); // FAS or FSE
    const baseIdx = DATA.positions.findIndex(p => p.abbr === base);
    DATA.positions.splice(baseIdx >= 0 ? baseIdx + 1 : DATA.positions.length, 0,
      { abbr, full: EXTRA_POSITIONS[abbr] });
  }
});
const positions  = DATA.positions;   // [{abbr, full}]
const raciCols   = DATA.raci_cols;   // all abbrs in source order
const allRows    = DATA.rows;

// ── State ────────────────────────────────────────────────────────────────────
let selectedPos  = new Set();   // empty = All
let selDep       = "";
let selCat       = "";
let searchText   = "";

// ── Init ─────────────────────────────────────────────────────────────────────
function init() {
  // Populate department / category selects
  const deps = [...new Set(allRows.map(r=>r.dep).filter(Boolean))].sort();
  const cats = [...new Set(allRows.map(r=>r.cat).filter(Boolean))].sort();
  const depSel = document.getElementById('depFilter');
  const catSel = document.getElementById('catFilter');
  deps.forEach(d => { const o=document.createElement('option'); o.value=d; o.textContent=d; depSel.appendChild(o); });
  cats.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; catSel.appendChild(o); });

  depSel.addEventListener('change', e => { selDep = e.target.value; updateFilterOptions(); render(); });
  catSel.addEventListener('change', e => { selCat = e.target.value; updateFilterOptions(); render(); });
  document.getElementById('searchInput').addEventListener('input', e => {
    searchText = e.target.value.toLowerCase(); render();
  });

  // Build position chips
  const container = document.getElementById('posChips');
  // "All" chip
  const allChip = document.createElement('span');
  allChip.className = 'chip chip-all active';
  allChip.id = 'chip-all';
  allChip.textContent = 'All positions';
  allChip.addEventListener('click', () => { selectedPos.clear(); updateChips(); updateFilterOptions(); render(); });
  container.appendChild(allChip);

  positions.forEach(p => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.dataset.abbr = p.abbr;
    chip.dataset.tooltip = p.full;
    chip.textContent = p.abbr;
    chip.addEventListener('click', () => {
      if (selectedPos.has(p.abbr)) selectedPos.delete(p.abbr);
      else selectedPos.add(p.abbr);
      updateChips(); updateFilterOptions(); render();
    });
    container.appendChild(chip);
  });

  render();
  updateFilterOptions();
}

function updateChips() {
  document.getElementById('chip-all').classList.toggle('active', selectedPos.size === 0);
  document.querySelectorAll('.chip[data-abbr]').forEach(ch => {
    ch.classList.toggle('active', selectedPos.has(ch.dataset.abbr));
  });
}

function resetFilters() {
  selectedPos.clear();
  selDep = ""; selCat = ""; searchText = "";
  document.getElementById('depFilter').value = "";
  document.getElementById('catFilter').value = "";
  document.getElementById('searchInput').value = "";
  updateFilterOptions();
  updateChips(); render();
}

// ── Dynamic filter greying ────────────────────────────────────────────────────
function updateFilterOptions() {
  const depSel = document.getElementById('depFilter');
  const catSel = document.getElementById('catFilter');

  // Rows visible given the OTHER filters (pos + search, but not dep/cat themselves)
  function rowsMatchingBase(row) {
    if (!row.task || row.task.trim() === '') return false;
    if (searchText && ![row.dep, row.cat, row.task, row.date, row.outcome].some(f => (f||'').toLowerCase().includes(searchText))) return false;
    if (selectedPos.size > 0) {
      const hasPos = [...selectedPos].some(abbr => (row.raci[abbr]||'').trim() !== '');
      if (!hasPos) return false;
    }
    return true;
  }

  // Available deps given current catFilter (and base filters)
  const availableDeps = new Set(
    allRows.filter(r => rowsMatchingBase(r) && (selCat === '' || r.cat === selCat)).map(r => r.dep).filter(Boolean)
  );
  // Available cats given current depFilter (and base filters)
  const availableCats = new Set(
    allRows.filter(r => rowsMatchingBase(r) && (selDep === '' || r.dep === selDep)).map(r => r.cat).filter(Boolean)
  );

  // Update dep options
  Array.from(depSel.options).forEach(opt => {
    if (opt.value === '') return; // keep "(All)" always enabled
    opt.disabled = !availableDeps.has(opt.value);
  });
  // Update cat options
  Array.from(catSel.options).forEach(opt => {
    if (opt.value === '') return;
    opt.disabled = !availableCats.has(opt.value);
  });

  // Update position chips
  document.querySelectorAll('.chip[data-abbr]').forEach(ch => {
    const abbr = ch.dataset.abbr;
    // A chip is "available" if at least one row matches current dep+cat+search with this position having a value
    const available = allRows.some(r => {
      if (!r.task || r.task.trim() === '') return false;
      if (selDep && r.dep !== selDep) return false;
      if (selCat && r.cat !== selCat) return false;
      if (searchText && ![r.dep, r.cat, r.task, r.date, r.outcome].some(f => (f||'').toLowerCase().includes(searchText))) return false;
      return (r.raci[abbr]||'').trim() !== '';
    });
    if (available) {
      ch.classList.remove('chip-disabled');
      ch.style.pointerEvents = '';
    } else {
      ch.classList.add('chip-disabled');
      ch.style.pointerEvents = 'none';
    }
  });
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  // Determine which position columns to show
  let activePosAbbrs;
  if (selectedPos.size === 0) {
    activePosAbbrs = raciCols;   // show all columns
  } else {
    // keep source order
    activePosAbbrs = raciCols.filter(a => selectedPos.has(a));
  }

  // Filter rows — also exclude rows with no task
  const filtered = allRows.filter(row => {
    if (!row.task || row.task.trim() === '') return false;
    if (selDep && row.dep !== selDep) return false;
    if (selCat && row.cat !== selCat) return false;
    if (searchText && ![row.dep, row.cat, row.task, row.date, row.outcome].some(f => (f||'').toLowerCase().includes(searchText))) return false;
    return true;
  });

  // Build header
  const thead = document.getElementById('tableHead');
  thead.innerHTML = '';
  const tr1 = document.createElement('tr');
  const fixedCols = [
    {label:'Department', cls:'col-dep'},
    {label:'Category',   cls:'col-cat'},
    {label:'Task / Deliverable', cls:'col-task'},
    {label:'Deadline',   cls:'col-date'},
    {label:'Outcome',    cls:'col-out'},
  ];
  fixedCols.forEach(({label,cls}) => {
    const th = document.createElement('th');
    th.textContent = label; th.className = cls; tr1.appendChild(th);
  });
  // Role columns
  activePosAbbrs.forEach(abbr => {
    const th = document.createElement('th');
    th.className = 'col-role role-cols-header';
    const posObj = positions.find(p=>p.abbr===abbr);
    th.dataset.tooltip = posObj ? posObj.full : abbr;
    th.innerHTML = `<div style="font-size:12px;font-weight:800">${abbr}</div>`
                 + (posObj ? `<div style="font-size:11px;font-weight:400;opacity:.8;margin-top:2px;white-space:normal;max-width:70px;margin:2px auto 0">${posObj.full}</div>` : '');
    tr1.appendChild(th);
  });
  // Comments
  const thComm = document.createElement('th');
  thComm.textContent = 'Comments'; thComm.className = 'col-comm'; tr1.appendChild(thComm);
  thead.appendChild(tr1);

  // Build body
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    empty.style.display = 'block';
    document.getElementById('raciTable').style.display = 'none';
    updateStats(0, filtered.length);
    return;
  }
  empty.style.display = 'none';
  document.getElementById('raciTable').style.display = '';

  // Sort by dep so each department separator appears exactly once
  const depOrder = [...new Set(filtered.map(r => r.dep))];
  filtered.sort((a, b) => depOrder.indexOf(a.dep) - depOrder.indexOf(b.dep));

  let lastDep = null;
  filtered.forEach(row => {
    // Department separator row
    if (row.dep !== lastDep && row.dep) {
      const sepTr = document.createElement('tr');
      sepTr.className = 'dep-separator';
      const sepTd = document.createElement('td');
      sepTd.colSpan = 5 + activePosAbbrs.length + 1;
      sepTd.textContent = '▸  ' + row.dep;
      sepTr.appendChild(sepTd);
      tbody.appendChild(sepTr);
      lastDep = row.dep;
    }

    const tr = document.createElement('tr');

    // Fixed cells
    const cells = [
      {val: row.dep,     cls: 'col-dep'},
      {val: row.cat,     cls: 'col-cat'},
      {val: row.task,    cls: 'col-task' + (row.taskRed ? ' red-task' : '')},
      {val: row.date,    cls: 'col-date'},
      {val: row.outcome, cls: 'col-out'},
    ];
    cells.forEach(({val, cls}) => {
      const td = document.createElement('td');
      td.className = cls; td.textContent = val || '';
      tr.appendChild(td);
    });

    // Role cells
    activePosAbbrs.forEach(abbr => {
      const td = document.createElement('td');
      td.className = 'col-role';
      const val = (row.raci[abbr] || '').trim();
      if (val && 'RACI'.includes(val)) {
        const b = document.createElement('span');
        b.className = `badge badge-${val}`;
        b.textContent = val;
        b.dataset.tooltip = RACI_TOOLTIPS[val] || val;
        td.appendChild(b);
      } else {
        const b = document.createElement('span');
        b.className = 'badge badge-empty';
        b.textContent = '·';
        td.appendChild(b);
      }
      tr.appendChild(td);
    });

    // Comments
    const tdComm = document.createElement('td');
    tdComm.className = 'col-comm'; tdComm.textContent = row.comments || '';
    tr.appendChild(tdComm);

    tbody.appendChild(tr);
  });

  updateStats(filtered.length, activePosAbbrs.length);
}

function updateStats(rowCount, posCount) {
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `Showing <b>${rowCount}</b> tasks · <b>${posCount}</b> position column${posCount!==1?'s':''} displayed`;
}

// ── RACI Tooltip descriptions ────────────────────────────────────────────────
const RACI_TOOLTIPS = {
  R: 'Responsible – This team member does the work to complete the task. Every task needs at least one Responsible party, but it\'s okay to assign more.',
  A: 'Accountable – This person delegates work and is the last one to review the task or deliverable before it\'s deemed complete. On some tasks, the Responsible party may also serve as the Accountable one.',
  C: 'Consulted – Every deliverable is strengthened by review and consultation from more than one team member. Consulted parties are typically the people who provide input based on either how it will impact their future project work or their domain of expertise on the deliverable itself.',
  I: 'Informed – These team members simply need to be kept in the loop on project progress, rather than roped into the details of every deliverable.'
};

const tooltip = document.getElementById('tooltip');
let tooltipTimer = null;

document.addEventListener('mouseover', e => {
  const target = e.target.closest('[data-tooltip]');
  if (!target) return;
  tooltipTimer = setTimeout(() => {
    tooltip.textContent = target.dataset.tooltip;
    tooltip.classList.add('visible');
    positionTooltip(e);
  }, 500);
});

document.addEventListener('mousemove', e => {
  if (tooltip.classList.contains('visible')) positionTooltip(e);
});

document.addEventListener('mouseout', e => {
  const target = e.target.closest('[data-tooltip]');
  if (!target) return;
  clearTimeout(tooltipTimer);
  tooltip.classList.remove('visible');
});

function positionTooltip(e) {
  const x = e.clientX;
  const y = e.clientY;
  const tw = tooltip.offsetWidth;
  const left = Math.min(x - tw / 2, window.innerWidth - tw - 10);
  tooltip.style.left = Math.max(10, left) + 'px';
  tooltip.style.top  = (y - tooltip.offsetHeight - 14) + 'px';
}

init();
</script>
